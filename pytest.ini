[pytest]
# Pytest configuration for Faiss tests
# This configuration matches the tests run in test.sh
# 
# The test files are explicitly listed in .vscode/settings.json
# This file provides additional pytest configuration

# Python path
pythonpath = .

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    gpu: marks tests that require GPU
    slow: marks tests as slow running

# Test discovery patterns (for reference, actual files are specified in VSCode settings)
# These patterns help pytest identify test files when running from command line
python_files = test_*.py
python_classes = Test*
python_functions = test_*
